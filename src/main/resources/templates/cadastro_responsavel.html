<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos_comuns :: head('Cadastro de Responsável')}"></head>
<body>
<div class="container-main">
    <h2 th:text="${responsavel.id == null ? 'Novo Responsável' : 'Editar Responsável'}">Novo Responsável</h2>
    <hr>
    
    <div th:replace="~{fragmentos_comuns :: alerts}"></div>

    <form th:action="@{/salvar}" th:object="${responsavel}" method="post" id="responsavelForm">
        <input type="hidden" th:field="*{id}">
        
        <!-- Tabs Nav -->
        <ul class="nav nav-tabs" id="formTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="dados-tab" data-bs-toggle="tab" data-bs-target="#dados" type="button" role="tab">
                    Dados Pessoais <span class="tab-status-badge ms-1"></span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="moradia-tab" data-bs-toggle="tab" data-bs-target="#moradia" type="button" role="tab">
                    Moradia <span class="tab-status-badge ms-1"></span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="renda-tab" data-bs-toggle="tab" data-bs-target="#renda" type="button" role="tab">
                    Renda <span class="tab-status-badge ms-1"></span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="educacao-tab" data-bs-toggle="tab" data-bs-target="#educacao" type="button" role="tab">
                    Educação e Bens <span class="tab-status-badge ms-1"></span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="familia-tab" data-bs-toggle="tab" data-bs-target="#familia" type="button" role="tab">
                    Família <span class="tab-status-badge ms-1"></span>
                </button>
            </li>
        </ul>

        <!-- Tabs Content -->
        <div class="tab-content" id="formTabsContent">
            <!-- Dados Pessoais -->
            <div class="tab-pane fade show active" id="dados" role="tabpanel">
                <div class="row">
                    <!-- Coluna da Foto -->
                    <div class="col-md-4 mb-3 text-center">
                        <label class="form-label d-block">Foto de Perfil</label>
                        <div class="webcam-container">
                            <video id="webcam-preview" autoplay playsinline></video>
                            <img id="photo-preview" th:src="${responsavel.foto != null ? responsavel.foto : ''}" th:style="${responsavel.foto != null ? 'display:block' : 'display:none'}">
                            <div id="placeholder" class="photo-placeholder" th:style="${responsavel.foto == null ? 'display:flex' : 'display:none'}">
                                <i class="bi bi-camera fs-1"></i>
                                <span>Sem foto</span>
                            </div>
                        </div>
                        <input type="hidden" th:field="*{foto}" id="inputFoto">
                        <canvas id="canvas-capture" style="display:none;"></canvas>
                        
                        <div class="webcam-controls mt-2">
                            <button type="button" class="btn btn-sm btn-outline-secondary" id="btn-abrir-camera">
                                <i class="bi bi-camera-video"></i> Abrir Câmera
                            </button>
                            <button type="button" class="btn btn-sm btn-success d-none" id="btn-capturar">
                                <i class="bi bi-camera"></i> Tirar Foto
                            </button>
                            <button type="button" class="btn btn-sm btn-danger d-none" id="btn-resetar">
                                <i class="bi bi-arrow-counterclockwise"></i> Nova Foto
                            </button>
                        </div>
                    </div>

                    <!-- Coluna dos Dados -->
                    <div class="col-md-8">
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Nome Completo</label>
                                <input type="text" th:field="*{nomeCompleto}" class="form-control" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">CPF</label>
                                <input type="text" th:field="*{cpf}" class="form-control cpf-mask" required placeholder="000.000.000-00" maxlength="14">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Celular</label>
                                <input type="text" th:field="*{celular}" class="form-control celular-mask" placeholder="(00) 00000-0000" maxlength="15">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Data de Nascimento</label>
                                <div class="input-group">
                                    <input type="text" th:field="*{dataNascimento}" class="form-control date-mask" id="dataNascimento" placeholder="DD/MM/AAAA" maxlength="10">
                                    <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('datePicker').showPicker()">
                                        <i class="bi bi-calendar3"></i>
                                    </button>
                                    <input type="date" id="datePicker" style="position: absolute; top: 0; left: 0; opacity: 0; width: 1px; height: 1px; pointer-events: none;">
                                </div>
                            </div>
                        </div>
                        <div class="row" th:if="${responsavel.id != null}">
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Código de Barras</label>
                                <input type="text" th:field="*{codigoBarras}" class="form-control" placeholder="Código de Barras do responsável">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Observações</label>
                    <textarea th:field="*{obs}" class="form-control" rows="3"></textarea>
                </div>
            </div>

            <!-- Moradia -->
            <div class="tab-pane fade" id="moradia" role="tabpanel">
                <div class="section-title">Endereço</div>
                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label class="form-label">CEP</label>
                        <div class="d-flex align-items-center">
                            <input type="text" th:field="*{moradia.endereco.cep}" class="form-control cep-mask" id="cep" placeholder="00000-000" maxlength="9">
                            <div class="spinner-border spinner-border-sm text-primary loading-spinner" id="cepSpinner" role="status"></div>
                        </div>
                    </div>
                    <div class="col-md-7 mb-3">
                        <label class="form-label">Logradouro</label>
                        <input type="text" th:field="*{moradia.endereco.logradouro}" class="form-control" id="logradouro">
                    </div>
                    <div class="col-md-2 mb-3">
                        <label class="form-label">Nº</label>
                        <input type="text" th:field="*{moradia.endereco.numero}" class="form-control">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Bairro</label>
                        <input type="text" th:field="*{moradia.endereco.bairro}" class="form-control" id="bairro">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Complemento</label>
                        <input type="text" th:field="*{moradia.endereco.complemento}" class="form-control" placeholder="Apto, Bloco, etc.">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Localidade</label>
                        <input type="text" th:field="*{moradia.endereco.localidade}" class="form-control" id="localidade">
                    </div>
                    <div class="col-md-2 mb-3">
                        <label class="form-label">UF</label>
                        <input type="text" th:field="*{moradia.endereco.uf}" class="form-control" id="uf">
                    </div>
                </div>
                
                <div class="section-title mt-3">Características</div>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Tipo de Moradia</label>
                        <select th:field="*{moradia.tipo}" class="form-select">
                            <option value="">Selecione...</option>
                            <option value="Própria">Própria</option>
                            <option value="Alugada">Alugada</option>
                            <option value="Cedida">Cedida</option>
                            <option value="Ocupação">Ocupação</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Nº Cômodos</label>
                        <input type="number" th:field="*{moradia.numeroComodos}" class="form-control">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Material</label>
                        <input type="text" th:field="*{moradia.material}" class="form-control" placeholder="Ex: Alvenaria">
                    </div>
                </div>

                <div class="section-title mt-3">Serviços</div>
                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Água</label>
                        <select th:field="*{moradia.servicos.agua}" class="form-select">
                            <option value="Rede Pública">Rede Pública</option>
                            <option value="Poço">Poço</option>
                            <option value="Caminhão Pipa">Caminhão Pipa</option>
                            <option value="Não possui">Não possui</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Esgoto</label>
                        <select th:field="*{moradia.servicos.esgoto}" class="form-select">
                            <option value="Rede Pública">Rede Pública</option>
                            <option value="Fossa">Fossa</option>
                            <option value="Céu Aberto">Céu Aberto</option>
                            <option value="Não possui">Não possui</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Lixo</label>
                        <select th:field="*{moradia.servicos.lixo}" class="form-select">
                            <option value="Coleta Pública">Coleta Pública</option>
                            <option value="Queima/Enterra">Queima/Enterra</option>
                            <option value="Não possui">Não possui</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Eletricidade</label>
                        <select th:field="*{moradia.servicos.eletricidade}" class="form-select">
                            <option value="Com Relógio">Com Relógio</option>
                            <option value="Sem Relógio">Sem Relógio</option>
                            <option value="Não possui">Não possui</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Renda -->
            <div class="tab-pane fade" id="renda" role="tabpanel">
                <div class="row mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Renda Bruta Familiar</label>
                        <div class="input-group">
                            <span class="input-group-text">R$</span>
                            <input type="text" th:field="*{renda.rendaBruta}" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="section-title">Fonte de Renda</div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Principal Fonte de Renda</label>
                        <select th:field="*{renda.fontesRenda.tipo}" class="form-select" id="selectFonteRenda">
                            <option value="">Selecione...</option>
                            <option value="Trabalho Formal">Trabalho Formal</option>
                            <option value="Trabalho Informal">Trabalho Informal</option>
                            <option value="Pensão">Pensão</option>
                            <option value="BPC/LOAS">BPC/LOAS</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3 d-none" id="divOutraFonte">
                        <label class="form-label">Especifique (se Outros)</label>
                        <input type="text" th:field="*{renda.fontesRenda.outros}" class="form-control">
                    </div>
                </div>
            </div>

            <!-- Educação e Bens -->
            <div class="tab-pane fade" id="educacao" role="tabpanel">
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label">Escolaridade do Responsável</label>
                        <select th:field="*{educacaoBens.escolaridadeResponsavel}" class="form-select">
                            <option value="">Selecione...</option>
                            <option value="Analfabeto">Analfabeto</option>
                            <option value="Fundamental Incompleto">Fundamental Incompleto</option>
                            <option value="Fundamental Completo">Fundamental Completo</option>
                            <option value="Médio Incompleto">Médio Incompleto</option>
                            <option value="Médio Completo">Médio Completo</option>
                            <option value="Superior">Superior</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Qtd. Estudantes na Casa</label>
                        <input type="number" th:field="*{educacaoBens.qtdEstudantes}" class="form-control">
                    </div>
                </div>

                <div class="section-title mt-3">Bens Duráveis</div>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Geladeira</label>
                        <select th:field="*{educacaoBens.bens.geladeira}" class="form-select">
                            <option value="true">Sim</option>
                            <option value="false">Não</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Máquina de Lavar</label>
                        <select th:field="*{educacaoBens.bens.maquinaLavar}" class="form-select">
                            <option value="true">Sim</option>
                            <option value="false">Não</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Computador</label>
                        <select th:field="*{educacaoBens.bens.computador}" class="form-select">
                            <option value="true">Sim</option>
                            <option value="false">Não</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Carro</label>
                        <select th:field="*{educacaoBens.bens.carro}" class="form-select">
                            <option value="true">Sim</option>
                            <option value="false">Não</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Motocicleta</label>
                        <select th:field="*{educacaoBens.bens.motocicleta}" class="form-select">
                            <option value="true">Sim</option>
                            <option value="false">Não</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Família -->
            <div class="tab-pane fade" id="familia" role="tabpanel">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="section-title mb-0" style="border:none">Outros Membros da Família</div>
                    <button type="button" class="btn btn-sm btn-success" id="addMembro">
                        <i class="bi bi-plus-lg"></i> Adicionar Membro
                    </button>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-bordered" id="tabelaFamilia">
                        <thead class="table-light">
                            <tr>
                                <th>Nome Completo</th>
                                <th>Parentesco</th>
                                <th>Nascimento</th>
                                <th>Ocupação/Escola</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="membrosCorpo">
                            <tr th:each="membro, stat : *{identificacaoFamiliar}">
                                <td><input type="text" th:field="*{identificacaoFamiliar[__${stat.index}__].nomeCompleto}" class="form-control form-control-sm" required></td>
                                <td><input type="text" th:field="*{identificacaoFamiliar[__${stat.index}__].parentesco}" class="form-control form-control-sm" required></td>
                                <td>
                                    <div class="input-group input-group-sm">
                                        <input type="text" th:field="*{identificacaoFamiliar[__${stat.index}__].dataNascimento}" class="form-control date-mask" placeholder="DD/MM/AAAA" maxlength="10">
                                        <button class="btn btn-outline-secondary" type="button" th:onclick="|document.getElementById('dp-fam-${stat.index}').showPicker()|">
                                            <i class="bi bi-calendar3"></i>
                                        </button>
                                        <input type="date" th:id="'dp-fam-' + ${stat.index}" class="fam-dp" style="position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none;">
                                    </div>
                                </td>
                                <td><input type="text" th:field="*{identificacaoFamiliar[__${stat.index}__].ocupacaoEscola}" class="form-control form-control-sm"></td>
                                <td class="text-center">
                                    <button type="button" class="btn btn-outline-danger btn-sm" onclick="this.closest('tr').remove()">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="d-flex justify-content-between mt-4">
            <a href="/" class="btn btn-secondary">
                <i class="bi bi-x-circle"></i> Cancelar
            </a>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-circle"></i> Salvar Cadastro
            </button>
        </div>
    </form>
</div>

<div th:replace="~{fragmentos_comuns :: scripts}"></div>
<div th:replace="~{fragmentos_comuns :: masks}"></div>

<script>
    let membroIndex = document.querySelectorAll('#membrosCorpo tr').length;

    function addMembroRow() {
        const tbody = document.getElementById('membrosCorpo');
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><input type="text" name="identificacaoFamiliar[${membroIndex}].nomeCompleto" class="form-control form-control-sm" required></td>
            <td><input type="text" name="identificacaoFamiliar[${membroIndex}].parentesco" class="form-control form-control-sm" required></td>
            <td>
                <div class="input-group input-group-sm">
                    <input type="text" name="identificacaoFamiliar[${membroIndex}].dataNascimento" class="form-control date-mask" placeholder="DD/MM/AAAA" maxlength="10">
                    <button class="btn btn-outline-secondary" type="button" onclick="this.nextElementSibling.showPicker()">
                        <i class="bi bi-calendar3"></i>
                    </button>
                    <input type="date" class="fam-dp" style="position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none;">
                </div>
            </td>
            <td><input type="text" name="identificacaoFamiliar[${membroIndex}].ocupacaoEscola" class="form-control form-control-sm"></td>
            <td class="text-center">
                <button type="button" class="btn btn-outline-danger btn-sm" onclick="this.closest('tr').remove()">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        `;
        tbody.appendChild(row);
        const dateInput = row.querySelector('.date-mask');
        if (dateInput) aplicarMascaraData(dateInput);
        membroIndex++;
    }

    document.getElementById('addMembro').addEventListener('click', addMembroRow);

    // Sincronização Global de DatePickers
    document.addEventListener('change', function(e) {
        if (e.target.type === 'date') {
            const dateInput = e.target;
            const textInput = dateInput.closest('.input-group').querySelector('.date-mask');
            if (textInput && dateInput.value) {
                const [year, month, day] = dateInput.value.split('-');
                textInput.value = `${day}/${month}/${year}`;
                textInput.dispatchEvent(new Event('input'));
            }
        }
    });

    const selectFonteRenda = document.getElementById('selectFonteRenda');
    const divOutraFonte = document.getElementById('divOutraFonte');

    if (selectFonteRenda) {
        selectFonteRenda.addEventListener('change', function() {
            if (this.value === 'Outros') {
                divOutraFonte.classList.remove('d-none');
            } else {
                divOutraFonte.classList.add('d-none');
                divOutraFonte.querySelector('input').value = '';
            }
        });
        if (selectFonteRenda.value === 'Outros') divOutraFonte.classList.remove('d-none');
    }

    const cepInput = document.getElementById('cep');
    const spinner = document.getElementById('cepSpinner');

    if (cepInput) {
        cepInput.addEventListener('blur', function() {
            let cep = this.value.replace(/\D/g, '');
            if (cep.length === 8) {
                spinner.style.display = 'block';
                fetch(`https://viacep.com.br/ws/${cep}/json/`)
                    .then(response => response.json())
                    .then(data => {
                        spinner.style.display = 'none';
                        if (!data.erro) {
                            document.getElementById('logradouro').value = data.logradouro;
                            document.getElementById('bairro').value = data.bairro;
                            document.getElementById('localidade').value = data.localidade;
                            document.getElementById('uf').value = data.uf;
                        } else {
                            alert('CEP não encontrado.');
                        }
                    })
                    .catch(() => {
                        spinner.style.display = 'none';
                        alert('Erro ao consultar o serviço de CEP.');
                    });
            }
        });
    }

    // Webcam Logic
    const video = document.getElementById('webcam-preview');
    const photoPreview = document.getElementById('photo-preview');
    const placeholder = document.getElementById('placeholder');
    const canvas = document.getElementById('canvas-capture');
    const inputFoto = document.getElementById('inputFoto');
    const btnAbrir = document.getElementById('btn-abrir-camera');
    const btnCapturar = document.getElementById('btn-capturar');
    const btnResetar = document.getElementById('btn-resetar');
    let stream = null;

    btnAbrir.addEventListener('click', async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            video.srcObject = stream;
            video.style.display = 'block';
            photoPreview.style.display = 'none';
            placeholder.style.display = 'none';
            btnAbrir.classList.add('d-none');
            btnCapturar.classList.remove('d-none');
        } catch (err) {
            console.error("Erro ao acessar a webcam: ", err);
            alert("Não foi possível acessar a webcam. Verifique as permissões.");
        }
    });

    btnCapturar.addEventListener('click', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const dataUrl = canvas.toDataURL('image/jpeg');
        inputFoto.value = dataUrl;
        photoPreview.src = dataUrl;
        
        photoPreview.style.display = 'block';
        video.style.display = 'none';
        btnCapturar.classList.add('d-none');
        btnResetar.classList.remove('d-none');
        
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
    });

    btnResetar.addEventListener('click', () => {
        inputFoto.value = '';
        photoPreview.style.display = 'none';
        placeholder.style.display = 'flex';
        btnResetar.classList.add('d-none');
        btnAbrir.classList.remove('d-none');
        atualizarStatusAbas();
    });

    // Função para atualizar os indicadores visuais das abas
    function atualizarStatusAbas() {
        const tabs = [
            { tabId: 'dados-tab', paneId: 'dados' },
            { tabId: 'moradia-tab', paneId: 'moradia' },
            { tabId: 'renda-tab', paneId: 'renda' },
            { tabId: 'educacao-tab', paneId: 'educacao' },
            { tabId: 'familia-tab', paneId: 'familia' }
        ];

        tabs.forEach(t => {
            const pane = document.getElementById(t.paneId);
            const tabBtn = document.getElementById(t.tabId);
            if (!pane || !tabBtn) return;

            const fields = Array.from(pane.querySelectorAll('input, select, textarea'));
            
            // Filtra campos válidos: ignora helper sem name, hidden, checkboxes, radios, botões e campos dentro de containers d-none
            const validFields = fields.filter(f => {
                if (!f.name) {
                    return false;
                }
                if (f.type === 'hidden' || f.type === 'checkbox' || f.type === 'radio' || f.type === 'button' || f.type === 'submit') {
                    return false;
                }
                // Ignora se estiver dentro de um container oculto com 'd-none' (ex: outra fonte de renda)
                if (f.closest('.d-none')) {
                    return false;
                }
                return true;
            });

            let emptyRequiredCount = 0;
            let emptyOptionalCount = 0;

            validFields.forEach(f => {
                const val = f.value ? f.value.trim() : '';
                if (val === '') {
                    if (f.hasAttribute('required')) {
                        emptyRequiredCount++;
                    } else {
                        // Ignora campos tipicamente opcionais como observações ou complemento
                        const id = f.id || '';
                        const name = f.name || '';
                        const placeholderText = f.placeholder || '';
                        if (id !== 'obs' && !placeholderText.includes('Opcional') && !name.includes('complemento')) {
                            emptyOptionalCount++;
                        }
                    }
                }
            });

            if (t.paneId === 'familia') {
                const rows = pane.querySelectorAll('#membrosCorpo tr');
                if (rows.length === 0) {
                    emptyOptionalCount = 1;
                }
            }

            const badgeSpan = tabBtn.querySelector('.tab-status-badge');
            if (badgeSpan) {
                if (emptyRequiredCount > 0) {
                    badgeSpan.innerHTML = `<span class="d-inline-block rounded-circle bg-danger ms-1" style="width: 8px; height: 8px; vertical-align: middle;" title="${emptyRequiredCount} campo(s) obrigatório(s) pendente(s)"></span>`;
                } else if (emptyOptionalCount > 0) {
                    badgeSpan.innerHTML = `<span class="d-inline-block rounded-circle bg-warning ms-1" style="width: 8px; height: 8px; vertical-align: middle;" title="${emptyOptionalCount} campo(s) opcional(ais) vazio(s)"></span>`;
                } else {
                    badgeSpan.innerHTML = `<span class="d-inline-block rounded-circle bg-success ms-1" style="width: 8px; height: 8px; vertical-align: middle;" title="Todos os campos preenchidos"></span>`;
                }
            }
        });
    }

    // Inicialização e escuta de eventos para o formulário
    document.addEventListener('DOMContentLoaded', () => {
        atualizarStatusAbas();
        
        const formEl = document.getElementById('responsavelForm');
        if (formEl) {
            formEl.addEventListener('input', atualizarStatusAbas);
            formEl.addEventListener('change', atualizarStatusAbas);
            formEl.addEventListener('click', () => {
                setTimeout(atualizarStatusAbas, 100);
            });
        }
    });
</script>
</body>
</html>
