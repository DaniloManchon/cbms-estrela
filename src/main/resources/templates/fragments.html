<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title} + ' - CBMS'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .container-main { max-width: 1000px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin: auto; }
        .nav-tabs { margin-bottom: 20px; }
        .section-title { border-bottom: 2px solid #dee2e6; margin-bottom: 15px; padding-bottom: 5px; color: #495057; font-weight: bold; }
        .loading-spinner { display: none; margin-left: 10px; }
        .card { margin-bottom: 20px; border: 1px solid #eee; border-radius: 8px; }
        .card-header { background-color: #fcfcfc; font-weight: bold; border-bottom: 1px solid #eee; }
        
        /* Webcam Styling */
        .webcam-container { position: relative; width: 100%; max-width: 320px; margin: auto; border: 2px solid #ddd; border-radius: 8px; overflow: hidden; background: #eee; }
        #webcam-preview { width: 100%; height: auto; display: block; }
        #photo-preview { width: 100%; height: auto; display: none; border-radius: 8px; border: 2px solid #28a745; }
        .webcam-controls { margin-top: 10px; text-align: center; }
        .photo-placeholder { height: 240px; display: flex; align-items: center; justify-content: center; color: #999; flex-direction: column; }
    </style>
</head>

<div th:fragment="alerts">
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>

<div th:fragment="masks">
    <script>
        function aplicarMascaraData(input) {
            input.addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '').slice(0, 10);
                if (v.length >= 5) {
                    v = v.replace(/^(\d{2})(\d{2})(\d{0,4}).*/, "$1/$2/$3");
                } else if (v.length >= 3) {
                    v = v.replace(/^(\d{2})(\d{0,2}).*/, "$1/$2");
                }
                e.target.value = v;
            });
        }

        function aplicarMascaraCPF(input) {
            input.addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '').slice(0, 11);
                if (v.length > 9) {
                    v = v.replace(/^(\d{3})(\d{3})(\d{3})(\d{2}).*/, "$1.$2.$3-$4");
                } else if (v.length > 6) {
                    v = v.replace(/^(\d{3})(\d{3})(\d{0,3}).*/, "$1.$2.$3");
                } else if (v.length > 3) {
                    v = v.replace(/^(\d{3})(\d{0,3}).*/, "$1.$2");
                }
                e.target.value = v;
            });
        }

        function aplicarMascaraCelular(input) {
            input.addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '').slice(0, 11);
                if (v.length > 10) {
                    v = v.replace(/^(\d{2})(\d{5})(\d{4}).*/, "($1) $2-$3");
                } else if (v.length > 6) {
                    v = v.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, "($1) $2-$3");
                } else if (v.length > 2) {
                    v = v.replace(/^(\d{2})(\d{0,5}).*/, "($1) $2");
                } else if (v.length > 0) {
                    v = v.replace(/^(\d{0,2}).*/, "($1");
                }
                e.target.value = v;
            });
        }

        function aplicarMascaraCEP(input) {
            input.addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '').slice(0, 8);
                if (v.length > 5) {
                    v = v.replace(/^(\d{5})(\d{3}).*/, "$1-$2");
                }
                e.target.value = v;
            });
        }

        // Inicialização global de máscaras
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.date-mask').forEach(aplicarMascaraData);
            document.querySelectorAll('.cpf-mask').forEach(aplicarMascaraCPF);
            document.querySelectorAll('.celular-mask').forEach(aplicarMascaraCelular);
            document.querySelectorAll('.cep-mask').forEach(aplicarMascaraCEP);
        });
    </script>
</div>
</html>
