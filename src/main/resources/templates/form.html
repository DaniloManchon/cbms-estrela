<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Responsável - CBMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container">
    <h2>Cadastrar Responsável</h2>
    <hr>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <form th:action="@{/salvar}" th:object="${responsavel}" method="post">
        <div class="mb-3">
            <label class="form-label">Nome Completo</label>
            <input type="text" th:field="*{nomeCompleto}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">CPF</label>
            <input type="text" th:field="*{cpf}" class="form-control" required placeholder="000.000.000-00">
        </div>
        <div class="mb-3">
            <label class="form-label">Celular</label>
            <input type="text" th:field="*{celular}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Data de Nascimento</label>
            <input type="date" th:field="*{dataNascimento}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Observações</label>
            <textarea th:field="*{obs}" class="form-control"></textarea>
        </div>
        
        <div class="d-flex justify-content-between">
            <a href="/" class="btn btn-secondary">Voltar</a>
            <button type="submit" class="btn btn-primary">Salvar Cadastro</button>
        </div>
    </form>
</div>
</body>
</html>
