<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Gestão de Beneficiários')}"></head>
<body>
<div class="container-main">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>ONG Estrela - CBMS</h1>
        <a href="/novo" class="btn btn-primary">
            <i class="bi bi-person-plus"></i> Novo Responsável
        </a>
    </div>

    <!-- Formulário de Busca -->
    <div class="row mb-4">
        <div class="col-md-6">
            <form th:action="@{/}" method="get" class="d-flex">
                <input type="text" name="busca" th:value="${termoBusca}" 
                       class="form-control me-2" placeholder="Buscar por Nome ou CPF...">
                <button type="submit" class="btn btn-outline-secondary">Buscar</button>
                <a th:if="${termoBusca}" href="/" class="btn btn-link text-decoration-none">Limpar</a>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments :: alerts}"></div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-light">
            <tr>
                <th>Nome</th>
                <th>CPF</th>
                <th>Última Coleta</th>
                <th>Total</th>
                <th class="text-center">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${responsaveis}">
                <td>
                    <a th:href="@{'/perfil/' + ${r.id}}" th:text="${r.nomeCompleto}" class="text-decoration-none fw-bold"></a>
                </td>
                <td th:text="${r.cpf}"></td>
                <td>
                    <span th:if="${r.coletas != null and !r.coletas.empty}" 
                          th:text="${#temporals.format(r.coletas[0].dataColeta, 'dd/MM/yyyy HH:mm')}">
                    </span>
                    <span th:unless="${r.coletas != null and !r.coletas.empty}" class="text-muted small">Nenhuma</span>
                </td>
                <td th:text="${r.coletas != null ? r.coletas.size() : 0}"></td>
                <td class="text-center">
                    <div class="btn-group" role="group">
                        <form th:action="@{'/coleta/' + ${r.cpf}}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-success" title="Registrar Coleta">
                                <i class="bi bi-cart-check"></i>
                            </button>
                        </form>
                        <a th:href="@{'/editar/' + ${r.id}}" class="btn btn-sm btn-outline-primary ms-1" title="Editar">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{'/perfil/' + ${r.id}}" class="btn btn-sm btn-outline-secondary ms-1" title="Ver Perfil">
                            <i class="bi bi-eye"></i>
                        </a>
                    </div>
                </td>
            </tr>
            <tr th:if="${responsaveis.empty}">
                <td colspan="5" class="text-center py-4 text-muted">Nenhum responsável encontrado.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
