<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CBMS - ONG Estrela</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Gestão de Cestas Básicas</h1>
        <a href="/novo" class="btn btn-primary">Novo Responsável</a>
    </div>

    <!-- Formulário de Busca -->
    <div class="row mb-4">
        <div class="col-md-6">
            <form th:action="@{/}" method="get" class="d-flex">
                <input type="text" name="busca" th:value="${termoBusca}" 
                       class="form-control me-2" placeholder="Buscar por Nome ou CPF...">
                <button type="submit" class="btn btn-outline-secondary">Buscar</button>
                <a th:if="${termoBusca}" href="/" class="btn btn-link text-decoration-none">Limpar</a>
            </form>
        </div>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Última Coleta</th>
            <th>Total</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${responsaveis}">
            <td>
                <a th:href="@{'/perfil/' + ${r.id}}" th:text="${r.nomeCompleto}" class="text-decoration-none fw-bold"></a>
            </td>
            <td th:text="${r.cpf}"></td>
            <td>
                <span th:if="${r.coletas != null and !r.coletas.empty}" 
                      th:text="${#temporals.format(r.coletas[r.coletas.size() - 1].dataColeta, 'dd/MM/yyyy HH:mm')}">
                </span>
                <span th:unless="${r.coletas != null and !r.coletas.empty}">Nenhuma</span>
            </td>
            <td th:text="${r.coletas != null ? r.coletas.size() : 0}"></td>
            <td>
                <div class="btn-group" role="group">
                    <form th:action="@{'/coleta/' + ${r.cpf}}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-success">Registrar Coleta</button>
                    </form>
                    <a th:href="@{'/perfil/' + ${r.id}}" class="btn btn-sm btn-outline-primary ms-1">Ver Detalhes</a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
