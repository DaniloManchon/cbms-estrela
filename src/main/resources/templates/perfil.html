<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Perfil do Responsável - CBMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 800px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .card { margin-bottom: 20px; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .badge-count { font-size: 1.2rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <h2 th:text="${responsavel.nomeCompleto}">Nome do Responsável</h2>
            <p class="text-muted">CPF: <span th:text="${responsavel.cpf}"></span></p>
        </div>
        <div class="text-end">
            <span class="badge bg-primary badge-count" th:text="${responsavel.coletas.size() + ' Cestas'}"></span>
        </div>
    </div>

    <div class="card p-3 bg-light">
        <h5>Informações de Contato</h5>
        <div class="row">
            <div class="col-md-6">
                <strong>Celular:</strong> <span th:text="${responsavel.celular != null ? responsavel.celular : 'Não informado'}"></span>
            </div>
            <div class="col-md-6">
                <strong>Nascimento:</strong> <span th:text="${responsavel.dataNascimento}"></span>
            </div>
        </div>
        <div class="mt-2" th:if="${responsavel.obs}">
            <strong>Observações:</strong>
            <p th:text="${responsavel.obs}"></p>
        </div>
    </div>

    <h4>Histórico de Retiradas</h4>
    <hr>
    <div th:if="${responsavel.coletas.empty}" class="alert alert-info">
        Nenhuma retirada registrada até o momento.
    </div>
    
    <ul class="list-group" th:unless="${responsavel.coletas.empty}">
        <li class="list-group-item d-flex justify-content-between align-items-center" 
            th:each="coleta : ${responsavel.coletas}">
            <div>
                <i class="bi bi-calendar-check"></i>
                <span th:text="${#temporals.format(coleta.dataColeta, 'dd/MM/yyyy ''às'' HH:mm')}"></span>
            </div>
            <span class="text-muted small" th:text="${coleta.observacao}"></span>
        </li>
    </ul>

    <div class="mt-4">
        <a href="/" class="btn btn-secondary">Voltar para a Lista</a>
    </div>
</div>
</body>
</html>
